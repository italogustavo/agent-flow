version: "3.9"

services:
  agent-flow:
    build: .
    container_name: agent-flow
    restart: unless-stopped
    ports:
      - "3790:3790"
    environment:
      - PORT=3790
      - AUTH_TOKEN=agent-5678
    volumes:
      # Volume nomeado para persistência do banco
      - agent-flow-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3790/api/tasks?token=agent-5678"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agent-flow-data:
    name: agent-flow-data
